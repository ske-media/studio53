<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="100%" height="100%" fill="none">
  <!-- Style CSS interne pour la typographie premium -->
  <style>
    .brand-title {
      font-family: 'Inter', 'SF Pro Display', -apple-system, sans-serif;
      font-weight: 300;
      fill: #FFFFFF;
      font-size: 38px;
      letter-spacing: 12px;
    }
    .brand-number {
      font-weight: 800;
      fill: #B87333; /* Orange Cuivré */
    }
    .brand-tagline {
      font-family: 'Inter', 'SF Pro Text', -apple-system, sans-serif;
      font-weight: 400;
      fill: #8E8E93; /* Gris chaud atténué */
      font-size: 11px;
      letter-spacing: 8px;
    }
  </style>

  <g transform="translate(10, 10)">
    <!-- Symbole géométrique (Intersection Architecture & Objectif) -->
    <g transform="translate(40, 35)">
      <!-- Cadre architectural noir/blanc -->
      <path d="M 0 0 L 60 0 L 60 60" stroke="#FFFFFF" stroke-width="4" stroke-miterlimit="10"/>
      <!-- Ligne de perturbation (Disruption) orange -->
      <path d="M 20 40 L 80 40 L 80 -20" stroke="#B87333" stroke-width="4" stroke-miterlimit="10"/>
      <!-- Point d'ancrage central -->
      <circle cx="40" cy="20" r="4" fill="#B87333"/>
    </g>

    <!-- Textes du Logo -->
    <!-- Nom Principal -->
    <text x="170" y="70" class="brand-title">
      STUDIO <tspan class="brand-number">53</tspan>
    </text>

    <!-- Slogan (Tagline) -->
    <text x="172" y="105" class="brand-tagline">
      DISRUPTIVE BY NATURE
    </text>
  </g>
</svg>