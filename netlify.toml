# STUDIO 53 — configuration Netlify
# Le build et le runtime Next.js sont gérés par @netlify/plugin-nextjs.

# Normalisation des URLs à slash dupliqué (ex: //landing-privee/...)
# Évite la SecurityError de history.replaceState côté client (chemin
# interprété comme URL protocol-relative).
[[redirects]]
  from = "//*"
  to = "/:splat"
  status = 301
  force = true
